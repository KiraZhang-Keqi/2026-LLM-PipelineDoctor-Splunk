# Pipeline Doctor - preventive alerts (static export)
# App context: search   Place in: $SPLUNK_HOME/etc/apps/search/local/savedsearches.conf
# Or generate dynamically via REST: python generate_alerts.py

[PipelineDoctor - Inventory null_rate breach (schema_change)]
search = index=main sourcetype=pipeline:data_quality check_name=null_rate status=fail (table="raw.inventory_snapshot" OR table="mart.product_availability") | stats max(value) as max_null_rate latest(threshold) as threshold values(column) as affected_columns by table
description = Fires when a null_rate DQ check fails on the inventory chain. Catches an un-propagated source column rename (e.g. stock_count -> available_qty) before the dashboard goes wrong.
disabled = 0
enableSched = 1
cron_schedule = */5 * * * *
dispatch.earliest_time = -30m
dispatch.latest_time = now
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.severity = 4
alert.track = 1
counttype = number of events
quantity = 0
relation = greater than

[PipelineDoctor - Inventory row_count collapse (volume_drop)]
search = index=main sourcetype=pipeline:data_quality check_name=row_count status=fail (table="raw.inventory_snapshot" OR table="mart.product_availability") | stats latest(value) as row_count latest(threshold) as min_expected_rows by table
description = Fires when a row_count DQ check fails on the inventory chain. Catches a partial source extraction where the ingest job still reports success (WARN, not fail).
disabled = 0
enableSched = 1
cron_schedule = */5 * * * *
dispatch.earliest_time = -30m
dispatch.latest_time = now
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.severity = 4
alert.track = 1
counttype = number of events
quantity = 0
relation = greater than

[PipelineDoctor - Inventory freshness SLA breach (freshness_delay)]
search = index=main sourcetype=pipeline:data_quality check_name=freshness_lag_min status=fail (table="raw.inventory_snapshot" OR table="mart.product_availability") | stats max(value) as max_lag_min latest(threshold) as threshold_min by table
description = Fires when a freshness_lag_min DQ check fails on the inventory chain. Catches a stalled source query so you are alerted before business users notice a stale dashboard.
disabled = 0
enableSched = 1
cron_schedule = */5 * * * *
dispatch.earliest_time = -30m
dispatch.latest_time = now
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.severity = 4
alert.track = 1
counttype = number of events
quantity = 0
relation = greater than


